<svg width="640" height="180" viewBox="0 0 640 180" xmlns="http://www.w3.org/2000/svg">
  <title>Now Playing - ON FYE</title>
  <desc>Art Deco animated now playing card</desc>

  <defs>
    <linearGradient id="lineH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7F77DD" stop-opacity="0"/>
      <stop offset="20%" stop-color="#7F77DD" stop-opacity="1"/>
      <stop offset="80%" stop-color="#7F77DD" stop-opacity="1"/>
      <stop offset="100%" stop-color="#7F77DD" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="progGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#534AB7"/>
      <stop offset="100%" stop-color="#AFA9EC"/>
    </linearGradient>
    <linearGradient id="trackGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#26215C"/>
      <stop offset="100%" stop-color="#1a1740"/>
    </linearGradient>
  </defs>

  <rect width="640" height="180" fill="#100d1a"/>

  <rect x="0" y="0" width="640" height="1" fill="url(#lineH)"/>
  <rect x="0" y="179" width="640" height="1" fill="url(#lineH)"/>

  <rect x="0" y="0" width="2" height="180" fill="#534AB7"/>
  <rect x="638" y="0" width="2" height="180" fill="#534AB7"/>

  <rect x="0" y="0" width="12" height="2" fill="#AFA9EC"/>
